<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NETFLIX</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome para ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header class="header" id="header">
        <div class="header-esquerda">
            <div class="logo">NETFLIX</div>
            <nav class="nav-menu">
                <a href="#" class="active" onclick="home()">Início</a>
                <a href="#" onclick="filtrar('tv')">Séries</a>
                <a href="#" onclick="filtrar('movie')">Filmes</a>
                <a href="#" onclick="mostrarMinhaLista()">Minha Lista</a>
                <a href="#" onclick="buscarFilmes()">Buscar</a>
            </nav>
        </div>
        <div class="header-direita">
            <div class="busca">
                <input type="text" id="input-busca" placeholder="Títulos, pessoas..." onkeyup="buscar(event)">
                <button onclick="buscarFilmes()"><i class="fas fa-search"></i></button>
            </div>
            <button class="btn-notificacao"><i class="fas fa-bell"></i></button>
            <div class="perfil" onclick="abrirMenuPerfil()">
                <img src="https://i.pinimg.com/564x/8f/1c/96/8f1c96f3c599240e9c14a89e2d8c2fef.jpg" alt="Perfil">
            </div>
        </div>
    </header>

    <!-- Banner Principal -->
    <section class="banner" id="banner">
        <div class="banner-conteudo">
            <h1 class="banner-titulo" id="banner-titulo">Carregando...</h1>
            <p class="banner-descricao" id="banner-descricao"></p>
            <div class="banner-botoes">
                <button class="btn assist" onclick="assistirAgora()">
                    <i class="fas fa-play"></i> Assistir
                </button>
                <button class="btn info" onclick="mostrarDetalhes()">
                    <i class="fas fa-info-circle"></i> Mais Informações
                </button>
                <button class="btn favorito" onclick="adicionarFavorito()">
                    <i class="fas fa-plus"></i> Minha Lista
                </button>
            </div>
        </div>
        <div class="banner-gradiente"></div>
    </section>

    <!-- Categorias -->
    <div class="categorias" id="categorias">
        <!-- Populares -->
        <section class="categoria">
            <h2 class="categoria-titulo">Populares na Netflix</h2>
            <div class="carrossel" id="populares"></div>
        </section>

        <!-- Em Alta -->
        <section class="categoria">
            <h2 class="categoria-titulo">Em Alta</h2>
            <div class="carrossel" id="em-alta"></div>
        </section>

        <!-- Séries -->
        <section class="categoria">
            <h2 class="categoria-titulo">Séries Populares</h2>
            <div class="carrossel" id="series"></div>
        </section>

        <!-- Filmes -->
        <section class="categoria">
            <h2 class="categoria-titulo">Filmes em Destaque</h2>
            <div class="carrossel" id="filmes"></div>
        </section>
    </div>

    <!-- Modal de Detalhes -->
    <div class="modal" id="modal-detalhes">
        <div class="modal-conteudo">
            <button class="fechar-modal" onclick="fecharModal()">&times;</button>
            <div class="modal-header">
                <img id="modal-banner" src="" alt="">
            </div>
            <div class="modal-corpo">
                <h2 id="modal-titulo"></h2>
                <div class="modal-info">
                    <span id="modal-nota"></span>
                    <span id="modal-ano"></span>
                    <span id="modal-tempo"></span>
                </div>
                <p id="modal-sinopse"></p>
                <div class="modal-botoes">
                    <button class="btn" onclick="assistirNoPlayer()">
                        <i class="fas fa-play"></i> Assistir
                    </button>
                    <button class="btn" onclick="downloadTelegram()">
                        <i class="fab fa-telegram"></i> Salvar no Telegram
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Player de Vídeo -->
    <div class="player-modal" id="player-modal">
        <div class="player-conteudo">
            <button class="fechar-player" onclick="fecharPlayer()">&times;</button>
            <div class="player-titulo">
                <h2 id="player-titulo"></h2>
            </div>
            <div class="player-video">
                <iframe id="video-frame" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>
            </div>
            <div class="player-opcoes">
                <button class="btn" onclick="abrirTelegramFilme()">
                    <i class="fab fa-telegram"></i> Abrir no Telegram
                </button>
            </div>
        </div>
    </div>

    <!-- Menu de Busca -->
    <div class="busca-resultados" id="busca-resultados">
        <div class="busca-container">
            <button class="fechar-busca" onclick="fecharBusca()">&times;</button>
            <h2>Resultados da Busca</h2>
            <div class="carrossel" id="resultados-busca"></div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="footer-links">
            <a href="#">Centro de Ajuda</a>
            <a href="#">Termos de Uso</a>
            <a href="#">Privacidade</a>
            <a href="#">Preferências de Cookies</a>
            <a href="#">Informações Corporativas</a>
        </div>
        <button class="btn-servico" onclick="abrirTelegram()">🔗 Vincular Telegram</button>
        <p>© 2024 Netflix Clone - Desenvolvido com API TMDB</p>
    </footer>

    <script src="api.js"></script>
    <script src="telegram.js"></script>
    <script src="player.js"></script>
    <script src="script.js"></script>
</body>
</html>
